# Release
# =======
# Release pipeline triggered via workflow_dispatch.
# Validates pre-flight conditions (semver format, tag
# uniqueness, CI status, unreleased commits), creates the
# tag, builds cross-platform binaries via GoReleaser,
# signs macOS archives with Apple Developer ID, notarizes
# them, and publishes to the Homebrew tap.
#
# Pattern replicated from unbound-force/unbound-force.
# See: https://github.com/unbound-force/gaze/issues/98

name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.15.0)'
        required: true
        type: string

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: read
    timeout-minutes: 10
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    outputs:
      has_signing_secrets: ${{ steps.check-secrets.outputs.has_secrets }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Validate tag format
        run: |
          if ! echo "$RELEASE_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid tag format: '$RELEASE_TAG'. Must match vMAJOR.MINOR.PATCH (e.g., v0.15.0)."
            exit 1
          fi
          echo "Tag format valid: $RELEASE_TAG"

      - name: Check tag uniqueness
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/${RELEASE_TAG}$"; then
            echo "::error::Tag '$RELEASE_TAG' already exists. Choose a different version."
            exit 1
          fi
          echo "Tag '$RELEASE_TAG' does not exist yet."

      - name: Verify semver ordering
        run: |
          LATEST=$(git tag -l 'v[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            echo "No existing tags found. First release."
            exit 0
          fi
          echo "Latest existing tag: $LATEST"
          # Compare using sort -V: if TAG sorts after LATEST, it is greater
          HIGHER=$(printf '%s\n%s' "$LATEST" "$RELEASE_TAG" | sort -V | tail -1)
          if [ "$HIGHER" = "$LATEST" ]; then
            echo "::error::Tag '$RELEASE_TAG' is not greater than latest release '$LATEST'."
            exit 1
          fi
          echo "Version ordering valid: $RELEASE_TAG > $LATEST"

      # Check names are derived from the name: fields in test.yml
      # and mega-linter.yml. If those workflow job names change,
      # update the REQUIRED_CHECKS array below to match.
      - name: Verify CI passed on HEAD
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          HEAD_SHA=$(git rev-parse HEAD)
          echo "Checking CI status for commit $HEAD_SHA"

          REQUIRED_CHECKS=(
            "Unit + Integration Tests (Go 1.24)"
            "Unit + Integration Tests (Go 1.25)"
            "MegaLinter"
          )

          for CHECK_NAME in "${REQUIRED_CHECKS[@]}"; do
            STATUS=$(gh api "repos/${GH_REPO}/commits/${HEAD_SHA}/check-runs" \
              --jq ".check_runs[] | select(.name == \"${CHECK_NAME}\") | .conclusion" \
              2>/dev/null | head -1)
            if [ "$STATUS" != "success" ]; then
              echo "::error::Required check '${CHECK_NAME}' has not passed (status: ${STATUS:-not found}). Push to main and wait for CI before releasing."
              exit 1
            fi
            echo "  ✓ ${CHECK_NAME}: success"
          done

          echo "All required CI checks passed."

      - name: Verify unreleased commits
        run: |
          LATEST=$(git tag -l 'v[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            COUNT=$(git rev-list --count HEAD)
          else
            COUNT=$(git rev-list --count "${LATEST}..HEAD")
          fi
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No unreleased commits since ${LATEST:-initial commit}. Nothing to release."
            exit 1
          fi
          echo "$COUNT commit(s) since ${LATEST:-initial commit}."

      - name: Create and push tag
        run: |
          # Skip if tag was already created (e.g., re-run after
          # partial failure or manual tag via GitHub API).
          if git ls-remote --tags origin | grep -q "refs/tags/${RELEASE_TAG}$"; then
            echo "Tag $RELEASE_TAG already exists, skipping creation."
            exit 0
          fi
          # Annotated tags require a committer identity on the
          # CI runner (git tag -a uses GIT_COMMITTER_NAME/EMAIL).
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"
          echo "Created and pushed tag: $RELEASE_TAG"

      - name: Check signing secrets
        id: check-secrets
        run: |
          if [ -n "$MACOS_SIGN_P12" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}

  release:
    runs-on: ubuntu-latest
    needs: preflight
    permissions:
      contents: write
    timeout-minutes: 45
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    outputs:
      has_signing_secrets: ${{ needs.preflight.outputs.has_signing_secrets }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89  # v7.2.2
        with:
          distribution: goreleaser
          version: 'v2.14.1'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload generated cask as release artifact
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/homebrew/Casks/gaze.rb \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push unsigned cask to tap (no signing secrets)
        if: ${{ needs.preflight.outputs.has_signing_secrets == 'false' }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/unbound-force/homebrew-tap.git" tap
          cp dist/homebrew/Casks/gaze.rb tap/Casks/gaze.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/gaze.rb
          git diff --cached --quiet && { echo "No cask changes needed"; exit 0; }
          git commit -m "Update gaze cask to ${RELEASE_TAG} (unsigned)"
          git push
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  sign-macos:
    runs-on: macos-latest
    needs: release
    if: ${{ needs.release.outputs.has_signing_secrets == 'true' }}
    permissions:
      contents: write
    timeout-minutes: 30
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - name: Import certificate into Keychain
        run: |
          set -euo pipefail
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo -n "$MACOS_SIGN_P12" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -P "$MACOS_SIGN_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}

      - name: Prepare notary key
        run: |
          set -euo pipefail
          echo -n "$MACOS_NOTARY_KEY" | base64 --decode -o "$RUNNER_TEMP/notary_key.p8"
        env:
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Download darwin archives
        run: |
          set -euo pipefail
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "gaze_*_darwin_*.tar.gz" --dir ./artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign and notarize
        run: |
          set -euo pipefail
          mkdir -p ./signed
          for archive in ./artifacts/gaze_*_darwin_*.tar.gz; do
            echo "==> Processing $(basename "$archive")"
            workdir=$(mktemp -d)

            # Extract binary
            tar -xzf "$archive" -C "$workdir"

            # Sign with codesign
            codesign --force --timestamp --options runtime \
              --sign "Developer ID Application: John Flowers (PGFWLVZX55)" \
              "$workdir/gaze"

            # Verify signature
            codesign --verify --verbose=2 "$workdir/gaze"

            # Zip for notarytool (requires .zip, not .tar.gz)
            ditto -c -k "$workdir/gaze" "$workdir/gaze.zip"

            # Submit for notarization and wait
            xcrun notarytool submit "$workdir/gaze.zip" \
              --key "$RUNNER_TEMP/notary_key.p8" \
              --key-id "$MACOS_NOTARY_KEY_ID" \
              --issuer "$MACOS_NOTARY_ISSUER_ID" \
              --wait --timeout 20m

            # Re-archive signed binary with original archive name
            tar -czf "./signed/$(basename "$archive")" -C "$workdir" gaze

            rm -rf "$workdir"
            echo "==> Done: $(basename "$archive")"
          done
        env:
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}

      - name: Replace release assets and update checksums
        run: |
          set -euo pipefail
          # Upload signed darwin archives (replaces unsigned)
          gh release upload "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" ./signed/*.tar.gz --clobber

          # Download existing checksums
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "checksums.txt" --dir ./

          # Remove darwin lines from checksums (keep linux and other lines)
          grep -v darwin checksums.txt > checksums_updated.txt || true

          # Compute SHA256 for each signed darwin archive
          for archive in ./signed/*.tar.gz; do
            shasum -a 256 "$archive" | sed 's|./signed/||' >> checksums_updated.txt
          done

          # Replace checksums file
          mv checksums_updated.txt checksums.txt
          gh release upload "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" checksums.txt --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew cask checksums
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"

          # Compute signed checksums
          ARM64_SHA=$(shasum -a 256 "./signed/gaze_${VERSION}_darwin_arm64.tar.gz" | awk '{print $1}')
          AMD64_SHA=$(shasum -a 256 "./signed/gaze_${VERSION}_darwin_amd64.tar.gz" | awk '{print $1}')

          echo "darwin_arm64 SHA256: $ARM64_SHA"
          echo "darwin_amd64 SHA256: $AMD64_SHA"

          # Download the GoReleaser-generated cask from release assets
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "gaze.rb" --dir ./cask-staging
          CASK_FILE="./cask-staging/gaze.rb"

          if [ ! -f "$CASK_FILE" ]; then
            echo "::error::Cask file not found in release assets: gaze.rb"
            exit 1
          fi

          # Extract original unsigned darwin checksums from the cask using
          # section-context parsing. This is order-agnostic — it works
          # regardless of whether sha256 appears before or after url.
          ORIG_AMD64_SHA=$(awk '
            /on_macos/ { in_macos=1 }
            in_macos && /on_intel/ { in_intel=1 }
            in_intel && /sha256/ {
              gsub(/.*sha256 "/, "")
              gsub(/".*/, "")
              print
              exit
            }
            in_intel && /end/ { in_intel=0 }
          ' "$CASK_FILE")

          ORIG_ARM64_SHA=$(awk '
            /on_macos/ { in_macos=1 }
            in_macos && /on_arm/ { in_arm=1 }
            in_arm && /sha256/ {
              gsub(/.*sha256 "/, "")
              gsub(/".*/, "")
              print
              exit
            }
            in_arm && /end/ { in_arm=0 }
          ' "$CASK_FILE")

          # Validate extraction — both checksums must be found
          if [ -z "$ORIG_AMD64_SHA" ] || [ -z "$ORIG_ARM64_SHA" ]; then
            echo "::error::Failed to extract darwin checksums from cask."
            echo "  darwin_amd64 (on_intel): '${ORIG_AMD64_SHA:-not found}'"
            echo "  darwin_arm64 (on_arm):   '${ORIG_ARM64_SHA:-not found}'"
            echo "  The GoReleaser cask template may have changed."
            exit 1
          fi

          echo "Original unsigned darwin_amd64: $ORIG_AMD64_SHA"
          echo "Original unsigned darwin_arm64: $ORIG_ARM64_SHA"

          # Replace unsigned checksums with signed checksums using sed.
          # Each SHA-256 hash is unique within the file, so direct string
          # replacement is unambiguous and order-agnostic.
          sed -i '' "s/$ORIG_AMD64_SHA/$AMD64_SHA/g" "$CASK_FILE"
          sed -i '' "s/$ORIG_ARM64_SHA/$ARM64_SHA/g" "$CASK_FILE"

          # Post-patch verification: confirm signed checksums are present
          AMD64_COUNT=$(grep -c "$AMD64_SHA" "$CASK_FILE" || true)
          ARM64_COUNT=$(grep -c "$ARM64_SHA" "$CASK_FILE" || true)

          if [ "$AMD64_COUNT" -ne 1 ]; then
            echo "::error::Verification failed: darwin_amd64 signed checksum appears $AMD64_COUNT times (expected 1)"
            exit 1
          fi
          if [ "$ARM64_COUNT" -ne 1 ]; then
            echo "::error::Verification failed: darwin_arm64 signed checksum appears $ARM64_COUNT times (expected 1)"
            exit 1
          fi

          echo "Verification passed: both signed checksums present exactly once"

          # Clone the tap, copy the patched cask, commit, and push
          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/unbound-force/homebrew-tap.git" tap
          cp "$CASK_FILE" tap/Casks/gaze.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/gaze.rb
          git diff --cached --quiet && { echo "No checksum changes needed"; exit 0; }
          git commit -m "Update macOS checksums for gaze v${VERSION} (post-signing)"
          git push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
